<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../dist/output.css">
    <title>VirtualGuard - Forgot Password</title>
    <link rel="stylesheet" href="forgot-password.css"> <!-- Create a new CSS file for the forgot password page styles -->
</head>
<body class="dark">

    <section class="bg-gray-50 dark:bg-gray-900">
        <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
            <a href="/" class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white">
                <img class="w-8 h-8 mr-2" src="/assets/shield.png" alt="logo">
                VirtualGuard
            </a>
            <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
                <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                    <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
                        Forgot Your Password?
                    </h1>
                    <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                        Enter your email address below and we'll send you a link to reset your password.
                    </p>
                    <form id="formForgotPassword" class="space-y-4 md:space-y-6" action="#">
                        <div>
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Your email</label>
                            <input type="email" name="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@company.com" required="">
                        </div>
                        <button id="buttonForgotPassword" type="submit" class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">Reset Password</button>
                    </form>
                    <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                        <a href="/p/login" class="font-medium text-primary-600 hover:underline dark:text-primary-500">Back to Sign in</a>
                    </p>
                    <h3 class="text-center" id="notification">empty_notification</h3>
                </div>
                <h4 style="text-align: center; padding-bottom: 5px;" class="text-s font-light text-gray-500 dark:text-gray-400" id="redirectToNotification"></h4>
            </div>
        </div>
    </section>

    <script src="forgot-password.js"></script> <!-- Create a new JS file for the forgot password page functionalities -->
</body>
</html>

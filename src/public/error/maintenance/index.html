<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
  <title>Maintenance Mode</title>
  <style>
    body {
      background-color: #111;
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center">
    <div class="max-w-3xl p-10 bg-gray-800 rounded-lg shadow-lg">
      <div class="text-center">
        <i class="fas fa-cog fa-spin text-gray-400 text-6xl"></i>
        <h1 class="mt-6 text-2xl font-semibold text-gray-300">Maintenance</h1>
        <p class="mt-3 text-lg text-gray-400">We are currently performing routine maintenance. We should be back shortly. Thank you for your patience.</p>
      </div>
      <div class="mt-6">
        <!--Use static links here since all GET requests are closed during maintenance-->
        <p class="text-center text-gray-400">For more information please visit our <a href="https://discord.gg/rxYyHv47" class="text-blue-500 hover:underline">Discord</a> or <a href="https://twitter.com/VirtualGuardIO" class="text-blue-500 hover:underline">Twitter</a>.</p>
      </div>
        <div class="mt-6 text-center text-gray-400 text-sm">
            <p class="text-center text-gray-400">We're sorry for the inconvenience - VirtualGuard Staff</p>
        </div>
    </div>
  </div>
</body>
</html>
